version: '3.8'

services:
  # Milvus 向量数据库
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    environment:
      ETCD_USE_EMBED: true
      COMMON_STORAGETYPE: local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 后端 API 服务
  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_URI: http://milvus:19530
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      milvus:
        condition: service_healthy

  # 前端
  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  milvus:
