apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-pvc
  namespace: customer-service
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: customer-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.6.15
          ports:
            - containerPort: 19530
              name: milvus
            - containerPort: 9091
              name: milvus-console
          env:
            - name: ETCD_USE_EMBED
              value: "true"
            - name: COMMON_STORAGETYPE
              value: "local"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "16Gi"
              cpu: "4"
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
          livenessProbe:
            tcpSocket:
              port: 19530
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 19530
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: milvus-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: customer-service
spec:
  type: ClusterIP
  ports:
    - port: 19530
      targetPort: 19530
      name: milvus
    - port: 9091
      targetPort: 9091
      name: milvus-console
  selector:
    app: milvus
